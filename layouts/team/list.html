{{ define "main" }}
<style>
  .team-page {
    max-width: 720px;
    margin: 4rem auto 0;
    padding: 3rem 1.5rem;
  }
  .team-header {
    margin-bottom: 2.5rem;
  }
  .team-header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text-primary);
  }
  .team-header p {
    margin-top: 0.4rem;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .team-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .team-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    transition: border-color 0.2s;
  }
  .team-card:hover {
    border-color: var(--accent);
  }
  .team-card .name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
  }
  .team-card .role {
    font-size: 0.78rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.2rem;
    margin-bottom: 0.6rem;
  }
  .team-card .bio {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .team-card .member-links {
    margin-top: 0.75rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .team-card .member-links a {
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.15s;
  }
  .team-card .member-links a:hover {
    color: var(--accent);
  }
</style>
<div class="team-page">
  <div class="team-header">
    <h1>Team</h1>
    <p>The people behind VXON Labs.</p>
  </div>
  <div class="team-list">
    {{ range .Pages }}
    <div class="team-card">
      <div class="name">{{ .Title }}</div>
      {{ with .Params.role }}<div class="role">{{ . }}</div>{{ end }}
      {{ with .Params.bio }}<div class="bio">{{ . }}</div>{{ end }}
      {{ with .Params.links }}
      <div class="member-links">
        {{ range . }}
        <a href="{{ .url }}" target="_blank" rel="noopener">{{ .label }} →</a>
        {{ end }}
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
