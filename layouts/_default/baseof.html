<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="stylesheet" href="/css/style.css" />
    </head>

    <body>
        <div class="top-bar">
            <div class="top-buttons">
                <a href="/" class="cmd-btn"><span class="prompt">$</span> /home</a>
                <a href="/team" class="cmd-btn"><span class="prompt">$</span> /team</a>
                <a href="https://github.com/VX0N-Labs/vxon.github.io" class="cmd-btn" target="_blank"><span class="prompt">$</span> /contribute</a>
                <div class="theme-wrap">
                    <button id="theme-trigger" class="cmd-btn"><span class="prompt">$</span> /theme <span id="theme-current">dark</span> <span class="arrow">&#9660;</span></button>
                    <div id="theme-menu" class="theme-menu">
                        <button data-value="dark">dark</button>
                        <button data-value="light">light</button>
                        <button data-value="cyberpunk">cyberpunk</button>
                        <button data-value="matrix">matrix</button>
                        <button data-value="sepia">sepia</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="container">{{ block "main" . }}{{ end }}</main>

        <script>
            const html = document.documentElement;
            const trigger = document.getElementById('theme-trigger');
            const menu = document.getElementById('theme-menu');
            const currentLabel = document.getElementById('theme-current');

            function applyTheme(theme) {
                if (theme === 'dark') {
                    html.removeAttribute('data-theme');
                } else {
                    html.setAttribute('data-theme', theme);
                }
                currentLabel.textContent = theme;
            }

            const saved = localStorage.getItem('theme') || 'dark';
            applyTheme(saved);

            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                menu.classList.toggle('open');
            });

            menu.querySelectorAll('button').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const theme = this.dataset.value;
                    applyTheme(theme);
                    localStorage.setItem('theme', theme);
                    menu.classList.remove('open');
                });
            });

            document.addEventListener('click', function () {
                menu.classList.remove('open');
            });
        </script>

        <script>
            (function () {
                const originalTitle = document.title;
                const messages = [
                    'Come back to Vxon Team!',
                    'Don\'t leave us!',
                    'We miss you! 🥺',
                    '🚨 Still here?',
                    'You forgot something!',
                ];
                let intervalId = null;
                let index = 0;

                function startCycling() {
                    if (intervalId) return;
                    index = 0;
                    document.title = messages[index];
                    intervalId = setInterval(function () {
                        index = (index + 1) % messages.length;
                        document.title = messages[index];
                    }, 2000);
                }

                function stopCycling() {
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                    document.title = originalTitle;
                }

                document.addEventListener('visibilitychange', function () {
                    if (document.hidden) {
                        startCycling();
                    } else {
                        stopCycling();
                    }
                });
            })();
        </script>
    </body>
</html>
