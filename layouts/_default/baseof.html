<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="stylesheet" href="/css/style.css" />
        <script src="/js/theme.js" defer></script>
        <script src="/js/titles.js" defer></script>
        <script src="/js/palette.js" defer></script>
    </head>

    <body>
        <div class="top-bar">
            <div class="top-buttons">
                <a href="/" class="cmd-btn"><span class="prompt">$</span> /home</a>
                <a href="/team" class="cmd-btn"><span class="prompt">$</span> /team</a>
                <a href="/posts/contribute_to_vxon/" class="cmd-btn"><span class="prompt">$</span> /contribute</a>
                <div class="theme-wrap">
                    <button id="theme-trigger" class="cmd-btn"><span class="prompt">$</span> /theme <span id="theme-current">dark</span> <span class="arrow">&#9660;</span></button>
                    <div id="theme-menu" class="theme-menu">
                        <button data-value="dark">dark</button>
                        <button data-value="light">make me blind</button>
                        <button data-value="cyberpunk">cyberpunk</button>
                        <button data-value="matrix">matrix</button>
                        <button data-value="sepia">sepia</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="container">{{ block "main" . }}{{ end }}</main>

        <div id="cmd-palette-overlay" class="cmd-overlay">
            <div class="cmd-modal">
                <div class="cmd-input-wrap">
                    <span class="prompt">$</span>
                    <input id="cmd-input" type="text" placeholder="type a command..." autocomplete="off" spellcheck="false" />
                </div>
                <div id="cmd-results" class="cmd-results"></div>
            </div>
        </div>


    </body>
</html>
