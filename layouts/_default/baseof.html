<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="stylesheet" href="/css/style.css" />
    </head>

    <body>
        <div class="top-bar">
            <div class="top-buttons">
                <a href="/" class="cmd-btn"><span class="prompt">$</span> /home</a>
                <a href="/team" class="cmd-btn"><span class="prompt">$</span> /team</a>
                <a href="/posts/contribute_to_vxon/" class="cmd-btn"><span class="prompt">$</span> /contribute</a>
                <div class="theme-wrap">
                    <button id="theme-trigger" class="cmd-btn"><span class="prompt">$</span> /theme <span id="theme-current">dark</span> <span class="arrow">&#9660;</span></button>
                    <div id="theme-menu" class="theme-menu">
                        <button data-value="dark">dark</button>
                        <button data-value="light">make me blind</button>
                        <button data-value="cyberpunk">cyberpunk</button>
                        <button data-value="matrix">matrix</button>
                        <button data-value="sepia">sepia</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="container">{{ block "main" . }}{{ end }}</main>

        <div id="cmd-palette-overlay" class="cmd-overlay">
            <div class="cmd-modal">
                <div class="cmd-input-wrap">
                    <span class="prompt">$</span>
                    <input id="cmd-input" type="text" placeholder="type a command..." autocomplete="off" spellcheck="false" />
                </div>
                <div id="cmd-results" class="cmd-results"></div>
            </div>
        </div>
        <style>
            .cmd-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.7);
                z-index: 99999;
                align-items: flex-start;
                justify-content: center;
                padding-top: 12vh;
            }
            .cmd-overlay.open {
                display: flex;
            }
            .cmd-modal {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                width: 480px;
                max-width: 90vw;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }
            .cmd-input-wrap {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.75rem 1rem;
                border-bottom: 1px solid var(--border);
            }
            .cmd-input-wrap .prompt {
                color: var(--accent, #888);
                font-family: "Courier New", Courier, monospace;
                font-size: 0.9rem;
                flex-shrink: 0;
            }
            #cmd-input {
                flex: 1;
                background: transparent;
                border: none;
                font-size: 0.9rem;
                font-family: "Courier New", Courier, monospace;
                color: var(--text-primary);
                outline: none;
            }
            #cmd-input::placeholder {
                color: var(--text-secondary, #666);
            }
            .cmd-results {
                max-height: 240px;
                overflow-y: auto;
            }
            .cmd-result-item {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.6rem 1rem;
                cursor: pointer;
                font-family: "Courier New", Courier, monospace;
                font-size: 0.85rem;
                color: var(--text-primary);
                transition: background 0.1s;
            }
            .cmd-result-item:hover,
            .cmd-result-item.highlighted {
                background: var(--hover-bg, rgba(255,255,255,0.05));
            }
            .cmd-result-item .path {
                color: var(--accent, #888);
                font-size: 0.8rem;
            }
        </style>

        <script>
            const html = document.documentElement;
            const trigger = document.getElementById('theme-trigger');
            const menu = document.getElementById('theme-menu');
            const currentLabel = document.getElementById('theme-current');

            function applyTheme(theme) {
                if (theme === 'dark') {
                    html.removeAttribute('data-theme');
                } else {
                    html.setAttribute('data-theme', theme);
                }
                currentLabel.textContent = theme === 'light' ? 'make me blind' : theme;
            }

            const saved = localStorage.getItem('theme') || 'dark';
            applyTheme(saved);

            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                menu.classList.toggle('open');
            });

            menu.querySelectorAll('button').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const theme = this.dataset.value;
                    applyTheme(theme);
                    localStorage.setItem('theme', theme);
                    menu.classList.remove('open');
                });
            });

            document.addEventListener('click', function () {
                menu.classList.remove('open');
            });
        </script>

        <script>
            (function () {
                const originalTitle = document.title;
                const messages = [
                    'Come back to Vxon Team!',
                    'Don\'t leave us!',
                    'We miss you!',
                    'Still here?',
                    'You forgot something!',
                    'We have cookies!',
                    'Your team is waiting for you.',
                    'It\'s quiet without you.',
                    'Come say hi!',
                    'New writeups just dropped!',
                ];
                let intervalId = null;
                let index = 0;

                function startCycling() {
                    if (intervalId) return;
                    index = 0;
                    document.title = messages[index];
                    intervalId = setInterval(function () {
                        index = (index + 1) % messages.length;
                        document.title = messages[index];
                    }, 5000);
                }

                function stopCycling() {
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                    document.title = originalTitle;
                }

                document.addEventListener('visibilitychange', function () {
                    if (document.hidden) {
                        startCycling();
                    } else {
                        stopCycling();
                    }
                });
            })();
        </script>

        <script>
            (function () {
                var overlay = document.getElementById('cmd-palette-overlay');
                var input = document.getElementById('cmd-input');
                var results = document.getElementById('cmd-results');

                var commands = [
                    { label: 'Home', path: '/', cmd: '/home' },
                    { label: 'Team', path: '/team', cmd: '/team' },
                    { label: 'Vxon', path: '/vxon', cmd: '/vxon' },
                    { label: 'Contribute', path: 'https://github.com/VX0N-Labs/vxon.github.io', cmd: '/contribute' },
                ];

                function openPalette() {
                    overlay.classList.add('open');
                    input.value = '';
                    results.innerHTML = '';
                    renderCommands(commands);
                    setTimeout(function () { input.focus(); }, 50);
                }

                function closePalette() {
                    overlay.classList.remove('open');
                }

                function renderCommands(list) {
                    results.innerHTML = '';
                    list.forEach(function (cmd, i) {
                        var div = document.createElement('div');
                        div.className = 'cmd-result-item' + (i === 0 ? ' highlighted' : '');
                        div.innerHTML = '<span class="path">' + cmd.cmd + '</span><span>' + cmd.label + '</span>';
                        div.addEventListener('click', function () { navigate(cmd); });
                        div.addEventListener('mouseenter', function () {
                            results.querySelectorAll('.highlighted').forEach(function (el) { el.classList.remove('highlighted'); });
                            div.classList.add('highlighted');
                        });
                        results.appendChild(div);
                    });
                }

                function navigate(cmd) {
                    closePalette();
                    window.location.href = cmd.path;
                }

                function filterCommands(query) {
                    if (!query) return commands;
                    var q = query.toLowerCase();
                    return commands.filter(function (cmd) {
                        return cmd.label.toLowerCase().includes(q) || cmd.cmd.toLowerCase().includes(q);
                    });
                }

                var highlightedIndex = 0;

                input.addEventListener('input', function () {
                    var filtered = filterCommands(this.value);
                    renderCommands(filtered);
                    highlightedIndex = 0;
                });

                input.addEventListener('keydown', function (e) {
                    var items = results.querySelectorAll('.cmd-result-item');
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        var highlighted = results.querySelector('.highlighted');
                        if (highlighted) {
                            var idx = Array.prototype.indexOf.call(items, highlighted);
                            var filtered = filterCommands(input.value);
                            if (filtered[idx]) navigate(filtered[idx]);
                        }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        items.forEach(function (el) { el.classList.remove('highlighted'); });
                        highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
                        if (items[highlightedIndex]) items[highlightedIndex].classList.add('highlighted');
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        items.forEach(function (el) { el.classList.remove('highlighted'); });
                        highlightedIndex = Math.max(highlightedIndex - 1, 0);
                        if (items[highlightedIndex]) items[highlightedIndex].classList.add('highlighted');
                    } else if (e.key === 'Escape') {
                        closePalette();
                    }
                });

                document.addEventListener('keydown', function (e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        if (overlay.classList.contains('open')) {
                            closePalette();
                        } else {
                            openPalette();
                        }
                    }
                });

                overlay.addEventListener('click', function (e) {
                    if (e.target === overlay) closePalette();
                });
            })();
        </script>
    </body>
</html>
